<!doctype html>
<html lang="fr">
  <head>
    <meta charset="UTF-8" />
    <link rel="icon" type="image/svg+xml" href="/icon.svg" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <meta name="description" content="Plateforme de gestion locative entre particuliers - Sans frais d'agence" />
    <meta name="theme-color" content="#4f46e5" />

    <!-- PWA Meta Tags -->
    <link rel="manifest" href="/manifest.json" />
    <link rel="apple-touch-icon" href="/icon.svg" />

    <!-- Fonts -->
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700;800&family=Plus+Jakarta+Sans:wght@500;600;700;800&display=swap" rel="stylesheet">

    <!-- Google Sign-In -->
    <script src="https://accounts.google.com/gsi/client" async defer></script>

    <!-- Leaflet CSS -->
    <link rel="stylesheet" href="https://unpkg.com/leaflet@1.9.4/dist/leaflet.css"
      integrity="sha256-p4NxAoJBhIIN+hmNHrzRCf9tD/miZyoHS5obTRR9BMY="
      crossorigin=""/>

    <title>ImmoParticuliers - Gestion Locative</title>
  </head>
  <body>
    <!-- Anti-flash dark mode: apply theme BEFORE React + CSS load to prevent white flash -->
    <script>
      (function() {
        try {
          var stored = JSON.parse(localStorage.getItem('immo-theme') || '{}')
          if (stored.state && stored.state.isDark) {
            document.documentElement.classList.add('dark')
            // Set bg immediately so there's zero flash even before CSS parses
            document.documentElement.style.backgroundColor = '#0f172a'
            document.documentElement.style.color = '#e2e8f0'
          } else {
            document.documentElement.style.backgroundColor = '#f8fafc'
          }
        } catch(e) {}
      })()
    </script>
    <div id="root"></div>
    <script type="module" src="/src/main.tsx"></script>
  </body>
</html>
