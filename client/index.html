  <body>
    <!-- Anti-flash dark mode: apply theme BEFORE React + CSS load to prevent white flash -->
    <script>
      (function() {
        try {
          var stored = JSON.parse(localStorage.getItem('immo-theme') || '{}')
          if (stored.state && stored.state.isDark) {
            document.documentElement.classList.add('dark')
            // Set bg immediately so there's zero flash even before CSS parses
            document.documentElement.style.backgroundColor = '#0a0a0a'
            document.documentElement.style.color = '#e2e8f0'
          } else {
            document.documentElement.style.backgroundColor = '#fafaf8'
          }
        } catch(e) {}
      })()
    </script>
