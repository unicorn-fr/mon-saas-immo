<!doctype html>
<html lang="fr">
  <head>
    <meta charset="UTF-8" />
    <link rel="icon" type="image/svg+xml" href="/icon.svg" />

    <!-- VIEWPORT — viewport-fit=cover pour les encoches iPhone / Dynamic Island -->
    <meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover" />
    <meta name="description" content="Bailio — la plateforme n°1 de location immobilière entre particuliers en France. Zéro frais d'agence, bail électronique, calculateur de rentabilité locative." />
    <meta name="keywords" content="location immobilière, particulier à particulier, sans frais agence, gestion locative, bail électronique, calculateur rentabilité, investissement immobilier" />
    <meta name="robots" content="index, follow" />

    <!-- iOS Safari PWA -->
    <meta name="apple-mobile-web-app-capable" content="yes" />
    <meta name="apple-mobile-web-app-status-bar-style" content="default" />
    <meta name="apple-mobile-web-app-title" content="Bailio" />

    <!-- Android Chrome PWA -->
    <meta name="mobile-web-app-capable" content="yes" />
    <meta name="theme-color" content="#1a3270" />

    <!-- Évite le zoom automatique sur la détection téléphonique iOS -->
    <meta name="format-detection" content="telephone=no" />

    <!-- Open Graph -->
    <meta property="og:type" content="website" />
    <meta property="og:title" content="Bailio — Location sans agence" />
    <meta property="og:description" content="Propriétaires et locataires se rencontrent directement. Zéro frais d'agence, communication simplifiée, 100 % sécurisé." />
    <meta property="og:image" content="/og-image.png" />
    <meta property="og:locale" content="fr_FR" />

    <!-- Twitter Card -->
    <meta name="twitter:card" content="summary_large_image" />
    <meta name="twitter:title" content="Bailio — Location sans agence" />
    <meta name="twitter:description" content="Propriétaires et locataires se rencontrent directement. Zéro frais d'agence, 100 % sécurisé." />

    <!-- PWA Meta Tags -->
    <link rel="manifest" href="/manifest.json" />
    <link rel="apple-touch-icon" href="/icon.svg" />

    <!-- Fonts -->
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Cormorant+Garamond:ital,wght@0,400;0,500;0,600;0,700;1,400;1,600;1,700&family=DM+Sans:opsz,wght@9..40,300;9..40,400;9..40,500;9..40,600;9..40,700&display=swap" rel="stylesheet">

    <!-- Google Sign-In -->
    <script src="https://accounts.google.com/gsi/client" async defer></script>

    <!-- Leaflet CSS -->
    <link rel="stylesheet" href="https://unpkg.com/leaflet@1.9.4/dist/leaflet.css"
      integrity="sha256-p4NxAoJBhIIN+hmNHrzRCf9tD/miZyoHS5obTRR9BMY="
      crossorigin=""/>

    <title>Bailio - Gestion Locative</title>
  </head>
  <body>
    <!-- Anti-flash dark mode: apply theme BEFORE React + CSS load to prevent white flash -->
    <script>
      (function() {
        try {
          var stored = JSON.parse(localStorage.getItem('immo-theme') || '{}')
          if (stored.state && stored.state.isDark) {
            document.documentElement.classList.add('dark')
            // Set bg immediately so there's zero flash even before CSS parses
            document.documentElement.style.backgroundColor = '#0a0a0a'
            document.documentElement.style.color = '#e2e8f0'
          } else {
            document.documentElement.style.backgroundColor = '#fafaf8'
          }
        } catch(e) {}
      })()
    </script>
    <div id="root"></div>
    <script type="module" src="/src/main.tsx"></script>
  </body>
</html>
