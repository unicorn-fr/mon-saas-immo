[phases.setup]
nixPkgs = ["nodejs_20"]

[phases.install]
cmds = ["npm --prefix server ci"]

[phases.build]
cmds = ["npm --prefix server run build"]

[start]
cmd = "ulimit -n 65535 2>/dev/null || true && cd server && ./node_modules/.bin/prisma db push --accept-data-loss --skip-generate && npx pm2-runtime ecosystem.config.cjs --env production"
