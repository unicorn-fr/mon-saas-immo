[phases.setup]
nixPkgs = ["nodejs_20"]

[phases.install]
cmds = ["npm ci --prefix server"]

[phases.build]
cmds = ["npm run build --prefix server"]

[start]
cmd = "ulimit -n 65535 2>/dev/null || true && npx prisma db push --accept-data-loss --prefix server && pm2-runtime server/ecosystem.config.cjs --env production"
